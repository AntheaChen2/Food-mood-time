<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Insights</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell insights-shell">
    <section class="insights-page">
      <header class="insights-header">
        <h1>Weekly insights</h1>
        <p></p>
      </header>

  <section class="trend-card comparison-trend-card">

  <h2>👀你知道嗎？</h2>

  <p class="trend-subtitle">
    選兩個指標，看看過去七天的狀態變化吧
  </p>

 <div class="mini-chart-block">
  <select id="chartSelectA" class="chart-select">
    <option value="moodBefore">飯前心情</option>
    <option value="intake">飲食份量感受</option>
    <option value="moodAfter">飯後心情</option>
    <option value="bodyBefore">飯前身體狀態</option>
    <option value="bodyAfter">飯後身體狀態</option>
    <option value="stressScore">壓力分數</option>
    <option value="sleepMinutes">睡眠時長</option>
    <option value="steps">步數</option>
  </select>

  <p class="average-hint">
  灰色虛線代表截至今日的平均值
  </p>

  <svg class="single-insight-chart" viewBox="0 0 390 235">
    <line x1="58" y1="20" x2="58" y2="175" class="mini-axis" />
    <line x1="58" y1="175" x2="350" y2="175" class="mini-axis" />

    <line id="avgLineA" x1="58" x2="350" y1="90" y2="90" class="average-line" />

    <g id="yLabelsA"></g>
    <polyline id="chartLineA" class="mini-chart-line" points="" />
    <g id="chartDotsA"></g>
    <g id="xLabelsA"></g>
  </svg>
</div>

<div class="mini-chart-block">
  <select id="chartSelectB" class="chart-select">
    <option value="intake">飲食份量感受</option>
    <option value="moodBefore">飯前心情</option>
    <option value="moodAfter">飯後心情</option>
    <option value="bodyBefore">飯前身體狀態</option>
    <option value="bodyAfter">飯後身體狀態</option>
    <option value="stressScore">壓力分數</option>
    <option value="sleepMinutes">睡眠時長</option>
    <option value="steps">步數</option>
  </select>

  <p class="average-hint">
  灰色虛線代表截至今日的平均值
  </p>

  <svg class="single-insight-chart" viewBox="0 0 390 235">
    <line x1="58" y1="20" x2="58" y2="175" class="mini-axis" />
    <line x1="58" y1="175" x2="350" y2="175" class="mini-axis" />

    <line id="avgLineB" x1="58" x2="350" y1="90" y2="90" class="average-line" />

    <g id="yLabelsB"></g>
    <polyline id="chartLineB" class="mini-chart-line" points="" />
    <g id="chartDotsB"></g>
    <g id="xLabelsB"></g>
  </svg>
</div>

  <div class="date-range-controls">
  <label>
    <span>開始日期</span>
    <input type="date" id="startDateInput" />
  </label>
</div>

  </section>

  <section class="insight-section">
  <h2>
  讓你有活力的餐點💪
  <span class="insight-source-badge">來自 Q6 飯後身體狀態</span>
  </h2>
  <div class="insight-meal-grid" id="energyMeals"></div>
  <div class="swipe-hint insight-swipe-hint">
    <span>←</span>
    <small>左右滑動查看更多</small>
    <span>→</span>
  </div>
</section>

<section class="insight-section">
  <h2>
  吃完心情好的餐點😄
  <span class="insight-source-badge">來自 Q6 飯後心情</span>
  </h2>
  <div class="insight-meal-grid" id="happyMeals"></div>
  <div class="swipe-hint insight-swipe-hint">
    <span>←</span>
    <small>左右滑動查看更多</small>
    <span>→</span>
  </div>
</section>

<section class="insight-section">
  <h2>
  心情低落或有壓力時的餐點😥
  <span class="insight-source-badge">來自 Q4 飯前心情／壓力</span>
  </h2>
  <div class="insight-meal-grid" id="stressMeals"></div>
  <div class="swipe-hint insight-swipe-hint">
    <span>←</span>
    <small>左右滑動查看更多</small>
    <span>→</span>
  </div>
</section>

    </section>
      <nav class="bottom-nav" aria-label="Bottom navigation">

  <button class="nav-item" onclick="location.href='index.html'" type="button">
    <img src="icon/home.png" class="nav-icon" alt="Homepage" />
    <small>Homepage</small>
  </button>

  <button class="add-button" id="addButton" onclick="location.href='record.html'" aria-label="Add food entry">
    ＋
  </button>

  <button class="nav-item active" type="button">
    <img src="icon/idea.png" class="nav-icon" alt="Insights" />
    <small>Insights</small>
  </button>

</nav>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="user.js"></script>
  <script src="insights.js"></script>
</body>
</html>
