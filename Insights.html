<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Insights</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell insights-shell">
    <section class="insights-page">
      <header class="insights-header">
        <h1>Weekly insights</h1>
        <p>過去七天的飲食、心情與生活狀態回顧</p>
      </header>

  <section class="trend-card comparison-trend-card">

  <h2>👀你知道嗎？</h2>

  <p class="trend-subtitle">
    選兩個指標，看看過去七天的狀態變化吧
  </p>

  <div class="dual-chart-header">

    <select id="chartSelectLeft" class="chart-select">
      <option value="intake">飲食份量感受</option>
      <option value="moodBefore">飯前心情</option>
      <option value="moodAfter">飯後心情</option>
      <option value="bodyBefore">飯前身體狀態</option>
      <option value="bodyAfter">飯後身體狀態</option>
      <option value="stressScore">壓力分數</option>
      <option value="sleepMinutes">睡眠時長</option>
      <option value="steps">步數</option>
    </select>

    <select id="chartSelectRight" class="chart-select">
      <option value="">請選擇</option>
      <option value="intake">飲食份量感受</option>
      <option value="moodBefore">飯前心情</option>
      <option value="moodAfter">飯後心情</option>
      <option value="bodyBefore">飯前身體狀態</option>
      <option value="bodyAfter">飯後身體狀態</option>
      <option value="stressScore">壓力分數</option>
      <option value="sleepMinutes">睡眠時長</option>
      <option value="steps">步數</option>
    </select>

  </div>

  <svg
    class="dual-insight-chart"
    id="dualChart"
    viewBox="0 0 390 230"
  >

    <!-- 左 y 軸 -->
    <line x1="58" y1="34" x2="58" y2="175" class="mini-axis" />

    <!-- 右 y 軸 -->
    <line x1="322" y1="34" x2="322" y2="175" class="mini-axis" />

    <!-- x 軸 -->
    <line x1="58" y1="175" x2="322" y2="175" class="mini-axis" />

    <!-- 左 labels -->
    <g id="leftYLabels"></g>

    <!-- 右 labels -->
    <g id="rightYLabels"></g>

    <!-- x labels -->
    <g id="dualXLabels"></g>

    <!-- 左線 -->
    <polyline
      id="leftChartLine"
      class="dual-chart-line"
      points=""
    />

    <!-- 右線 -->
    <polyline
      id="rightChartLine"
      class="dual-chart-line"
      points=""
    />

    <!-- dots -->
    <g id="leftChartDots"></g>
    <g id="rightChartDots"></g>

  </svg>

  <div class="date-range-controls">
  <label>
    <span>開始日期</span>
    <input type="date" id="startDateInput" />
  </label>
</div>

  </section>

      <section class="insight-section">
        <h2>讓你有活力的餐點💪</h2>
        <div class="insight-meal-grid" id="energyMeals"></div>
      </section>

      <section class="insight-section">
        <h2>吃完心情好的餐點😄</h2>
        <div class="insight-meal-grid" id="happyMeals"></div>
      </section>

      <section class="insight-section">
        <h2>心情低落時或壓力大時的餐點😥</h2>
        <div class="insight-meal-grid" id="stressMeals"></div>
      </section>

    </section>

    <nav class="bottom-nav" aria-label="Bottom navigation">
      <button class="nav-item" onclick="location.href='index.html'">
        <span>🏠</span><small>Homepage</small>
      </button>
      <button class="add-button" onclick="location.href='record.html'">＋</button>
      <button class="nav-item active">
        <span>💡</span><small>Insights</small>
      </button>
    </nav>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="user.js"></script>
  <script src="insights.js"></script>
</body>
</html>
