<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food & Mood Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1 class="login-title">
      <span>Welcome to</span>
      <span>心情好食光!</span>
      </h1>

      <input
        id="displayName"
        type="text"
        placeholder="Enter your Nickname e.g., Anthea"
        autocomplete="name"
      />

      <p class="login-hint">
        This nickname will be used to identify your logs throughout the study.
      </p>

      <button id="startButton">Start My Journey</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="login.js"></script>
</body>
</html>
